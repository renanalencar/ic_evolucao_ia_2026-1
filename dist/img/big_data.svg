<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)" />
  
  <g filter="url(#glow2)" transform="translate(400, 300)">
    <!-- Data rings -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#4facfe" stroke-width="2" stroke-dasharray="15 15">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#f093fb" stroke-width="3" stroke-dasharray="20 30">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#00f2fe" stroke-width="1.5" stroke-dasharray="5 10">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </circle>
    
    <!-- Central Node -->
    <circle cx="0" cy="0" r="30" fill="#fff" />
    <circle cx="0" cy="0" r="20" fill="#020617" />
    <circle cx="0" cy="0" r="10" fill="#f093fb" >
       <animate attributeName="r" values="10;15;10" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
