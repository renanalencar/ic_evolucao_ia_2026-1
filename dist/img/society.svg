<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg_soc" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </radialGradient>
    <filter id="glow_soc" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg_soc)" />
  <g filter="url(#glow_soc)" transform="translate(400, 300)">
    <!-- Human and AI handshake / connection -->
    <!-- Human icon -->
    <circle cx="-80" cy="-40" r="30" fill="#4facfe" />
    <path d="M-130,50 C-130,-10 -30,-10 -30,50" fill="none" stroke="#4facfe" stroke-width="12" stroke-linecap="round" />
    
    <!-- Robot/AI icon -->
    <rect x="50" y="-70" width="60" height="60" rx="10" fill="none" stroke="#f093fb" stroke-width="8" />
    <circle cx="65" cy="-40" r="6" fill="#f093fb" />
    <circle cx="95" cy="-40" r="6" fill="#f093fb" />
    <path d="M30,50 L30,20 L130,20 L130,50" fill="none" stroke="#f093fb" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Connection -->
    <path d="M-30,30 L30,30" stroke="#00f2fe" stroke-width="8" stroke-dasharray="5 5">
       <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite" />
    </path>
    
    <!-- Balance scale -->
    <line x1="-150" y1="-120" x2="150" y2="-120" stroke="#fff" stroke-width="4" opacity="0.3" />
    <polygon points="0,-120 -20,-70 20,-70" fill="#fff" opacity="0.3" />
    <line x1="-130" y1="-120" x2="-130" y2="-80" stroke="#fff" stroke-width="2" opacity="0.3" />
    <line x1="130" y1="-120" x2="130" y2="-80" stroke="#fff" stroke-width="2" opacity="0.3" />
  </g>
</svg>
