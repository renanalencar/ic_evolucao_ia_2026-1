<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg_gen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
    <filter id="glow_gen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg_gen)" />
  <g filter="url(#glow_gen)" transform="translate(400, 300)">
    <!-- Central magic wand / generator idea -->
    <path d="M-50,50 L50,-50 L70,-30 L-30,70 Z" fill="#f093fb" />
    <circle cx="60" cy="-40" r="15" fill="#fff" />
    <!-- Sparks -->
    <path d="M70,-70 L80,-100 L90,-70 L120,-60 L90,-50 L80,-20 L70,-50 L40,-60 Z" fill="#00f2fe" >
      <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M20,-90 L25,-110 L30,-90 L50,-85 L30,-80 L25,-60 L20,-80 L0,-85 Z" fill="#f5576c" >
      <animateTransform attributeName="transform" type="scale" values="1;1.5;1" dur="1.5s" repeatCount="indefinite" />
    </path>
    <!-- Abstract generated shapes -->
    <rect x="-120" y="-80" width="40" height="40" rx="10" fill="none" stroke="#00f2fe" stroke-width="4" transform="rotate(15)" />
    <circle cx="-100" cy="50" r="25" fill="none" stroke="#f093fb" stroke-width="4" />
    <polygon points="-40,-100 -20,-140 -60,-140" fill="none" stroke="#f5576c" stroke-width="4" />
  </g>
</svg>
