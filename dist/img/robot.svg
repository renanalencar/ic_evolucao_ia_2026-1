<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
    <filter id="glow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)" />
  
  <g filter="url(#glow3)" transform="translate(400, 300)">
    <!-- Tech gear -->
    <path d="M-40,-80 L40,-80 L60,-40 L100,-40 L100,40 L60,40 L40,80 L-40,80 L-60,40 L-100,40 L-100,-40 L-60,-40 Z" fill="none" stroke="#10b981" stroke-width="5" />
    <circle cx="0" cy="0" r="40" fill="none" stroke="#34d399" stroke-width="4" />
    <circle cx="0" cy="0" r="15" fill="#10b981" />
    
    <!-- Arm -->
    <path d="M0,80 L0,180" stroke="#10b981" stroke-width="15" stroke-linecap="round" />
    <circle cx="0" cy="180" r="20" fill="#34d399" />
    <path d="M0,180 L80,240" stroke="#10b981" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
