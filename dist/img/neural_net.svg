<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg_nn" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <filter id="glow_nn" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg_nn)" />
  <g filter="url(#glow_nn)" transform="translate(400, 300)">
    <!-- Layer 1 -->
    <circle cx="-150" cy="-100" r="15" fill="#f093fb" />
    <circle cx="-150" cy="0" r="15" fill="#f093fb" />
    <circle cx="-150" cy="100" r="15" fill="#f093fb" />
    
    <!-- Layer 2 -->
    <circle cx="0" cy="-150" r="15" fill="#00f2fe" />
    <circle cx="0" cy="-50" r="15" fill="#00f2fe" />
    <circle cx="0" cy="50" r="15" fill="#00f2fe" />
    <circle cx="0" cy="150" r="15" fill="#00f2fe" />
    
    <!-- Layer 3 -->
    <circle cx="150" cy="-50" r="20" fill="#f5576c" />
    <circle cx="150" cy="50" r="20" fill="#f5576c" />
    
    <!-- Connections -->
    <g stroke="rgba(255,255,255,0.2)" stroke-width="2">
      <!-- From L1 to L2 -->
      <line x1="-150" y1="-100" x2="0" y2="-150"/>
      <line x1="-150" y1="-100" x2="0" y2="-50"/>
      <line x1="-150" y1="-100" x2="0" y2="50"/>
      <line x1="-150" y1="-100" x2="0" y2="150"/>
      
      <line x1="-150" y1="0" x2="0" y2="-150"/>
      <line x1="-150" y1="0" x2="0" y2="-50"/>
      <line x1="-150" y1="0" x2="0" y2="50"/>
      <line x1="-150" y1="0" x2="0" y2="150"/>
      
      <line x1="-150" y1="100" x2="0" y2="-150"/>
      <line x1="-150" y1="100" x2="0" y2="-50"/>
      <line x1="-150" y1="100" x2="0" y2="50"/>
      <line x1="-150" y1="100" x2="0" y2="150"/>
      
      <!-- From L2 to L3 -->
      <line x1="0" y1="-150" x2="150" y2="-50" stroke="#f093fb" />
      <line x1="0" y1="-150" x2="150" y2="50"/>
      <line x1="0" y1="-50" x2="150" y2="-50" stroke="#00f2fe" stroke-width="4"/>
      <line x1="0" y1="-50" x2="150" y2="50"/>
      <line x1="0" y1="50" x2="150" y2="-50"/>
      <line x1="0" y1="50" x2="150" y2="50" stroke="#f5576c" stroke-width="4"/>
      <line x1="0" y1="150" x2="150" y2="-50"/>
      <line x1="0" y1="150" x2="150" y2="50" stroke="#f093fb"/>
    </g>
  </g>
</svg>
