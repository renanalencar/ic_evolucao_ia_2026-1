<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="cyan-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#f093fb" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" />
  
  <g transform="translate(400, 300)" filter="url(#glow)">
    <!-- Brain outline paths -->
    <path d="M-120,-60 C-180,-100 -200,0 -160,80 C-120,160 -40,180 0,140 C40,180 120,160 160,80 C200,0 180,-100 120,-60 C100,-140 0,-160 0,-140 C0,-160 -100,-140 -120,-60 Z" fill="none" stroke="url(#cyan-pink)" stroke-width="4" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="5s" repeatCount="indefinite"/>
    </path>
    <!-- Nodes -->
    <circle cx="-80" cy="-20" r="8" fill="#00f2fe">
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="80" cy="-20" r="8" fill="#f093fb">
      <animate attributeName="r" values="8;12;8" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="-40" cy="60" r="10" fill="#00f2fe" />
    <circle cx="40" cy="60" r="10" fill="#f093fb" />
    <circle cx="0" cy="-80" r="12" fill="#fff" />
    
    <!-- Connections -->
    <line x1="-80" y1="-20" x2="-40" y2="60" stroke="#00f2fe" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="-20" x2="40" y2="60" stroke="#f093fb" stroke-width="2" opacity="0.6"/>
    <line x1="-80" y1="-20" x2="0" y2="-80" stroke="#00f2fe" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="-20" x2="0" y2="-80" stroke="#f093fb" stroke-width="2" opacity="0.6"/>
    <line x1="-40" y1="60" x2="40" y2="60" stroke="url(#cyan-pink)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="140" x2="-40" y2="60" stroke="#00f2fe" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="140" x2="40" y2="60" stroke="#f093fb" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
